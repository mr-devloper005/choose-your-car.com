services:
  cy6v8q2m4x:
    container_name: cy6v8q2m4x_app
    image: ghcr.io/mr-devloper005/choose-your-car.com:latest
    env_file:
      - .env
    network_mode: bridge
    restart: always
    ports:
      - "127.0.0.1:3074:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 5m
      timeout: 3s
      retries: 2
